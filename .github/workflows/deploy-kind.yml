# ============================================================
# Deploy IMD Weather ML to kind
# ============================================================
# Triggered by:
#   1. Push to main  (standard CI/CD)
#   2. workflow_dispatch  (manual / called by imd-data-sync.yml)
#
# The [skip ci] commits from the data sync job do NOT trigger
# this workflow via push -- it is triggered explicitly by the
# trigger-deploy job in imd-data-sync.yml instead.
# ============================================================

name: Deploy IMD Weather ML to kind

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"          # data commits use explicit trigger, not push
      - "**.md"
  workflow_dispatch:
    inputs:
      cluster_name:
        description: prod-cluster
        required: false
        default: prod-cluster

env:
  KIND_CLUSTER_NAME: ${{ inputs.cluster_name || 'prod-cluster' }}
  NAMESPACE: imd-weather

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python
        shell: powershell
        run: |
          python --version
          pip --version

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Show data summary
        shell: powershell
        run: |
          if (Test-Path data/processed/data_summary.json) {
            $s = Get-Content data/processed/data_summary.json | ConvertFrom-Json
            Write-Host "Data source  : $($s.last_updated)"
            Write-Host "Total rows   : $($s.total_rows)"
            Write-Host "Date range   : $($s.date_min) to $($s.date_max)"
            Write-Host "State count  : $($s.state_count)"
          } else {
            Write-Host "No data summary found - will use synthetic fallback during training."
          }

      - name: Train and test latest model
        shell: powershell
        run: |
          python -m src.train_baseline
          python -m pytest

      - name: Build ML image
        shell: powershell
        run: docker build -t imd-weather-ml:${{ github.sha }} .

      - name: Load ML image into kind
        shell: powershell
        run: kind load docker-image imd-weather-ml:${{ github.sha }} --name $env:KIND_CLUSTER_NAME

      - name: Deploy ML service
        shell: powershell
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/10-ml.yaml
          kubectl -n $env:NAMESPACE set image deployment/imd-weather-ml ml=imd-weather-ml:${{ github.sha }}
          kubectl -n $env:NAMESPACE rollout status deployment/imd-weather-ml --timeout=180s

      - name: Verify ML service
        shell: powershell
        run: |
          kubectl -n $env:NAMESPACE run ml-smoke-test --rm -i --restart=Never --image=curlimages/curl:8.11.1 -- `
            curl -fsS http://imd-weather-ml:8010/health
